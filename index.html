<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Case 2 · Assessing the Offers for Seven &amp; i Holdings ｜ 學生版</title>
<style>
:root{
  --ntu:#002B5C; --ntu2:#01356F; --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220; --muted:#475569;
  --muted2:#64748B; --line:#D7DEE9; --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --s0:#065F46; --t1:#4C1D95; --t2:#0F766E; --c1:#B45309; --s1:#1E3A5F; --ai:#991B1B;
  --green:#15803D; --sub:#94A3B8; --surface:#FBFCFE;
  --act:#0E7490; --ito:#7C3AED; --standalone:#475569;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:15px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}
.btn.primary{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.btn.primary:hover{background:var(--ntu2);}
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;max-width:1480px;margin:0 auto;}
.sidebar{position:sticky;top:86px;align-self:start;border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;border:1px solid transparent;
  background:transparent;cursor:pointer;font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(6,95,70,.10);border-color:rgba(6,95,70,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(76,29,149,.10);border-color:rgba(76,29,149,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(15,118,110,.10);border-color:rgba(15,118,110,.25);color:var(--t2);}
.navItem.seg-c1.active{background:rgba(180,83,9,.10);border-color:rgba(180,83,9,.25);color:var(--c1);}
.navItem.seg-s1.active{background:rgba(30,58,95,.10);border-color:rgba(30,58,95,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--muted);font-size:10px;}
.content{border:1px solid var(--line);border-radius:var(--radius2);background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(0,43,92,.25);
  background:rgba(0,43,92,.08);color:var(--ntu);padding:8px 14px;border-radius:999px;font-weight:800;white-space:nowrap;font-size:13px;}
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}
.timePill.cur{opacity:1!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.card{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}
.callout{border-left:5px solid var(--ntu);padding:12px 14px;background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout.teal{border-color:#0E7490;background:rgba(14,116,144,.06);}
.callout.teacher{border-color:#D97706;background:rgba(217,119,6,.07);border-style:dashed;}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}
.callout.teal strong{color:#164E63;}
.callout.teacher strong{color:#92400E;}
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 11px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);} .dot.g{background:#15803d;} .dot.p{background:#7C3AED;} .dot.r{background:#DC2626;} .dot.t{background:#0E7490;}
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);border-radius:14px;padding:14px;margin:10px 0;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);}
.tbl th,.tbl td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;line-height:1.5;}
.tbl th{background:rgba(0,43,92,.06);color:var(--ntu);font-weight:800;font-size:12.5px;letter-spacing:.02em;}
.tbl tbody tr:nth-child(even){background:rgba(244,247,252,.55);}
.tbl tbody tr:hover{background:rgba(201,162,39,.06);}
.revealBox{display:none;}
.revealBox.visible{display:block;animation:fadeSlide .3s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.debateGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.debateCard{border:1px solid var(--line);border-radius:14px;padding:14px;}
.debateCard.act{border-left:4px solid var(--act);}
.debateCard.ito{border-left:4px solid var(--ito);}
.debateCard.stand{border-left:4px solid var(--standalone);}
.debateLabel{font-weight:900;font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.debateCard.act .debateLabel{color:var(--act);}
.debateCard.ito .debateLabel{color:var(--ito);}
.debateCard.stand .debateLabel{color:var(--standalone);}
.govBar{background:linear-gradient(90deg,#E0F2FE,#DDD6FE,#FEE2E2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:13px;margin:10px 0;}
.govItem{text-align:center;flex:1;}
.govArrow{color:var(--muted);font-size:18px;}
.teacherBadge{display:inline-block;background:#D97706;color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.04em;margin-left:8px;}
.studentBadge{display:inline-block;background:#0F766E;color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.04em;margin-left:8px;}

.footballField{display:grid;grid-template-columns:160px 1fr 80px;gap:6px;align-items:center;margin:8px 0;font-size:12.5px;}
.ff-label{font-weight:800;color:var(--ink);}
.ff-bar-wrap{position:relative;height:18px;background:#f1f5f9;border-radius:4px;border:1px solid var(--line);}
.ff-bar{position:absolute;height:100%;border-radius:3px;}
.ff-bar.premium{background:rgba(76,29,149,.3);}
.ff-bar.multiple{background:rgba(15,118,110,.3);}
.ff-bar.sotp{background:rgba(180,83,9,.3);}
.ff-bar.dcf{background:rgba(0,43,92,.3);}
.ff-base{position:absolute;width:2px;height:100%;background:var(--ink);}
.ff-offer{position:absolute;width:2.5px;height:120%;top:-10%;}
.ff-offer.act{background:var(--act);}
.ff-offer.ito{background:var(--ito);}
.ff-val{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:right;}

/* === Interactive calculator styles === */
.calc{border:2px solid var(--t1);background:linear-gradient(180deg,rgba(76,29,149,.04),rgba(255,255,255,0));border-radius:14px;padding:16px;margin:14px 0;}
.calc.t2{border-color:var(--c1);background:linear-gradient(180deg,rgba(180,83,9,.04),rgba(255,255,255,0));}
.calc.dcf{border-color:var(--ntu);background:linear-gradient(180deg,rgba(0,43,92,.04),rgba(255,255,255,0));}
.calc h4{margin:0 0 10px;font-size:14.5px;font-weight:900;color:var(--t1);display:flex;align-items:center;gap:6px;}
.calc.t2 h4{color:var(--c1);}
.calc.dcf h4{color:var(--ntu);}
.calc .sliderRow{display:grid;grid-template-columns:160px 1fr 100px;align-items:center;gap:10px;padding:6px 0;}
.calc .sliderLabel{font-weight:700;font-size:13px;color:var(--ink);}
.calc input[type="range"]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--t1),var(--gold));outline:none;cursor:pointer;}
.calc.t2 input[type="range"]{background:linear-gradient(90deg,var(--c1),var(--gold));}
.calc.dcf input[type="range"]{background:linear-gradient(90deg,var(--ntu),var(--gold));}
.calc input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--t1);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:.15s;}
.calc input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15);}
.calc.t2 input[type="range"]::-webkit-slider-thumb{border-color:var(--c1);}
.calc.dcf input[type="range"]::-webkit-slider-thumb{border-color:var(--ntu);}
.calc input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--t1);cursor:pointer;}
.calc.t2 input[type="range"]::-moz-range-thumb{border-color:var(--c1);}
.calc.dcf input[type="range"]::-moz-range-thumb{border-color:var(--ntu);}
.calc .sliderVal{font-family:var(--mono);font-size:14px;font-weight:900;color:var(--t1);text-align:right;padding:4px 8px;background:#fff;border:1px solid var(--line);border-radius:6px;}
.calc.t2 .sliderVal{color:var(--c1);}
.calc.dcf .sliderVal{color:var(--ntu);}
.calc .liveResult{margin-top:14px;padding:14px;background:#fff;border:1.5px solid var(--t1);border-radius:10px;}
.calc.t2 .liveResult{border-color:var(--c1);}
.calc.dcf .liveResult{border-color:var(--ntu);}
.calc .liveResult .resTitle{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.calc .liveResult .resPrice{font-family:var(--mono);font-size:32px;font-weight:900;color:var(--t1);transition:.25s color;}
.calc.t2 .liveResult .resPrice{color:var(--c1);}
.calc.dcf .liveResult .resPrice{color:var(--ntu);}
.calc .liveResult.beat-ito .resPrice{color:#15803D;}
.calc .liveResult.beat-act .resPrice{color:#7C3AED;}
.calc .liveResult.below-current .resPrice{color:#DC2626;}
.calc .resSubline{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
.calc .vsLine{position:relative;height:34px;margin-top:12px;background:linear-gradient(90deg,#fef2f2 0%,#fef3c7 40%,#dcfce7 100%);border:1px solid var(--line);border-radius:6px;}
.calc .vsTick{position:absolute;top:-3px;width:2px;height:40px;}
.calc .vsTick.cur{background:var(--standalone);}
.calc .vsTick.act{background:var(--act);}
.calc .vsTick.ito{background:var(--ito);}
.calc .vsTick.live{background:#DC2626;animation:pulse 1.2s ease-in-out infinite;width:3px;}
.calc .vsTick .lbl{position:absolute;top:42px;left:-22px;width:50px;font-size:9px;font-weight:800;text-align:center;color:inherit;}
.calc .vsTick.cur .lbl{color:var(--standalone);}
.calc .vsTick.act .lbl{color:var(--act);}
.calc .vsTick.ito .lbl{color:var(--ito);}
.calc .vsTick.live .lbl{color:#DC2626;top:-22px;background:#fff;border:1px solid #DC2626;border-radius:6px;padding:1px 4px;width:auto;left:50%;transform:translateX(-50%);white-space:nowrap;}
@keyframes pulse{0%,100%{opacity:1;transform:scaleY(1);}50%{opacity:.6;transform:scaleY(1.15);}}
.calc .axisLabels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:24px;padding:0 4px;}

/* === SoTP segment bars (T2) === */
.sotpBars{display:grid;gap:8px;margin:12px 0;}
.sotpRow{display:grid;grid-template-columns:170px 1fr 120px;gap:10px;align-items:center;font-size:12.5px;}
.sotpRow .bu{font-weight:800;}
.sotpRow .barWrap{position:relative;height:24px;background:#f1f5f9;border-radius:5px;border:1px solid var(--line);overflow:hidden;}
.sotpRow .barFill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--c1),var(--gold));transition:width .35s cubic-bezier(.34,.62,.4,1);}
.sotpRow .barLabel{position:absolute;top:50%;transform:translateY(-50%);left:8px;font-family:var(--mono);font-size:11px;font-weight:900;color:#fff;text-shadow:0 0 4px rgba(0,0,0,.4);}
.sotpRow .barVal{font-family:var(--mono);font-weight:900;text-align:right;color:var(--c1);}
.sotpTotal{padding:12px;background:linear-gradient(90deg,rgba(180,83,9,.10),rgba(201,162,39,.10));border-radius:10px;text-align:center;margin-top:10px;}
.sotpTotal .totLbl{font-size:11px;color:var(--muted);letter-spacing:.06em;font-weight:800;text-transform:uppercase;}
.sotpTotal .totVal{font-family:var(--mono);font-size:28px;font-weight:900;color:var(--c1);transition:.25s;}
.sotpTotal.beat-act .totVal{color:#15803D;}
.sotpTotal.beat-ito .totVal{color:#7C3AED;}

/* Animated growth bars in S0 background */
.miniStat{display:grid;grid-template-columns:1fr 80px;gap:8px;align-items:center;margin:5px 0;font-size:12px;}
.miniStat .miniLabel{font-weight:700;color:var(--ink);}
.miniStat .miniBar{height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;border:1px solid var(--line);}
.miniStat .miniBarFill{height:100%;background:linear-gradient(90deg,var(--s0),var(--gold));animation:growFill 1.2s cubic-bezier(.34,.62,.4,1);}
.miniStat .miniVal{font-family:var(--mono);font-size:11.5px;font-weight:900;color:var(--s0);text-align:right;}
@keyframes growFill{from{width:0!important;}}

@media(max-width:880px){.layout{grid-template-columns:1fr;}.sidebar{position:static;max-height:none;}.grid2,.grid3{grid-template-columns:1fr;}.debateGrid{grid-template-columns:1fr;}.calc .sliderRow{grid-template-columns:1fr;}.sotpRow{grid-template-columns:1fr;}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ntu);color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:14px;transition:.3s ease;z-index:100;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.presenter .sidebar{display:none;}
.presenter .layout{grid-template-columns:1fr;padding:14px 20px;}
.presenter .content{font-size:17px;padding:28px 32px;min-height:calc(100vh - 80px);}
.presenter .h1{font-size:32px;}
.presenter .sub{font-size:17px;}
.presenter .p,.presenter .ul{font-size:17px;}
.presenter .cardTitle{font-size:17px;}
.presenter .card{padding:20px;}
.presenter .callout{font-size:16px;padding:14px 18px;}
.presenter .tbl th,.presenter .tbl td{font-size:14px;padding:10px 12px;}
.presenter .opt{font-size:16px;padding:12px 16px;}
.presenter .qTitle{font-size:17px;}
.presenter .pill{font-size:14px;}
.presenter #btnPresenter{background:var(--gold);border-color:var(--gold);color:#5A4600;box-shadow:0 0 0 3px rgba(201,162,39,.35);}
.presenter .topbar::after{content:"📽 投影模式 ON";position:fixed;top:10px;right:18px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.06em;pointer-events:none;z-index:30;}
.numberStat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;}
.numberStat .stat{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;text-align:center;}
.numberStat .stat .num{font-family:var(--mono);font-size:22px;font-weight:900;color:var(--ntu);}
.numberStat .stat .lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.tickerStrip{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;padding:10px 14px;background:linear-gradient(90deg,rgba(124,58,237,.08),rgba(14,116,144,.08));border-radius:12px;font-size:13px;}
.tickerStrip span{font-weight:800;color:var(--ntu);}
.tickerStrip strong{color:var(--ai);font-family:var(--mono);}
.bgGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 0;}

let ST = load();
const content = document.getElementById("content");
const toast = document.getElementById("toast");
function load(){try{const s=localStorage.getItem(STORE);return s?{...DEF,...JSON.parse(s)}:{...DEF};}catch(e){return{...DEF};}}
function save(){try{localStorage.setItem(STORE,JSON.stringify(ST));}catch(e){}}
function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove("show"),2200);}

function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){
  const p=getPoll(key);const t=tot(p);const zh=ST.lang==="zh";
  return `<div class="qBox">
    <p class="qTitle">📊 ${zh?title:title_en}</p>
    <div class="options">
      ${opts.map(([k,lz,le])=>`<button class="opt${p.choice===k?' chosen':''}" data-poll="${key}" data-opt="${k}">${k.toUpperCase()}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${t>0?`<div style="margin-top:10px;display:grid;gap:4px;">
      ${opts.map(([k,lz,le])=>`<div style="display:flex;align-items:center;gap:6px;">
        <span style="width:30px;font-weight:900;font-family:var(--mono);font-size:12px;">${pct(p,k)}%</span>
        <div class="bar"><div class="fill" style="width:${pct(p,k)}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${k.toUpperCase()}. ${zh?lz:le}</span>
      </div>`).join("")}
      <div style="margin-top:4px;"><span class="smallVote">${t} 票</span></div>
    </div>`:""}
    ${(zh?followup:followup_en)?`<hr class="sep"/><p class="sm" style="font-weight:800;">💬 討論追問</p><ul class="ul" style="font-size:13px;margin-top:0;color:var(--muted);">${(zh?followup:followup_en).map(q=>`<li>${q}</li>`).join("")}</ul>`:""}
  </div>`;
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){
  const zh=ST.lang==="zh";const done=ST.quizDone[key];
  return `<div class="qBox">
    <p class="qTitle">🧠 ${zh?q:q_en}</p>

}

function timeTags(cur){
  const segs=[["s0","🎬 S0","10min"],["t1","💰 T1 估值法","25min"],["t2","🧩 T2 SoTP","12min"],["c1","⚖️ C1 治理","8min"],["s1","📝 S1 Memo","5min"]];

}

function wireCalculators(){
  // EV/EBITDA multiple calculator (T1)
  const slMult = document.getElementById("slMult");
  if(slMult){
    const ebitda=1102, cash=1470, debt=4370, shares=2604.6;

      priceEl.textContent = "¥"+Math.round(ps).toLocaleString();

      res.classList.remove("beat-act","beat-ito","below-current");
      if(ps>=3400) res.classList.add("beat-ito");
      else if(ps>=2693) res.classList.add("beat-act");
      else if(ps<2556) res.classList.add("below-current");
      // subline
      let sub;
      const zh = ST.lang==="zh";
      if(ps>=3400) sub = zh?"🟣 已超過 J. Ito MBO 出價──需要極樂觀的 multiple 假設":"🟣 Exceeds J. Ito MBO — requires very bullish multiple";
      else if(ps>=2693) sub = zh?"🔵 已超過 ACT 第二次 offer──但落在『樂觀』情境":"🔵 Exceeds ACT 2nd offer — but in 'optimistic' scenario";
      else if(ps>=2556) sub = zh?"⚪ 落在 ACT 與當前市價之間":"⚪ Between current price and ACT offer";
      else sub = zh?"🔴 低於當前市價──ACT 不可能以這個 multiple 出價":"🔴 Below current price — ACT wouldn't bid this low";
      document.getElementById("multSub").textContent = sub;
      // vs line live tick (axis ¥0-¥5,000)
      const pct = Math.max(0,Math.min(100,ps/5000*100));
      const tick = document.getElementById("multLiveTick");
      tick.style.left = pct+"%";
      document.getElementById("multLiveLbl").textContent = "¥"+Math.round(ps).toLocaleString();
      calcSet('mult',parseInt(slMult.value,10));
    };
    slMult.addEventListener("input",update);
    update();
  }

  // DCF calculator (T1)
  const slMargin = document.getElementById("slMargin");
  if(slMargin){
    const slGrowth = document.getElementById("slGrowth");
    const update=()=>{
      const m = parseInt(slMargin.value,10)/1000;   // 0.035 ~ 0.065
      const g = parseInt(slGrowth.value,10)/1000;   // 0 ~ 0.04
      const wacc = 0.05, tg = 0.01, tax = 0.33;
      const baseRev = 11628.9;
      let pv = 0;
      // simple model: 5-year FCF + terminal value, matching Exhibit 11 logic
      // FCF = EBIAT + D&A - dWC - CapEx
      const da = [418.8,424.2,420,415,410];
      const dwc = [-42.9,-53.2,-38.9,-45.3,-43.9];
      const capex = [-407,-395.9,-390,-395,-400];
      let rev=baseRev; let fcfTerm=0;
      for(let t=0;t<5;t++){
        if(t>0) rev = rev*(1+g);
        const ebit = m*rev;
        const ebiat = ebit*(1-tax);
        const fcf = ebiat + da[t] + dwc[t] + capex[t];
        const df = 1/Math.pow(1+wacc,t+0.5);
        pv += fcf*df;
        if(t===4) fcfTerm = fcf;
      }
      const tv = fcfTerm*(1+tg)/(wacc-tg);
      const tvPv = tv * 1/Math.pow(1+wacc,4.5);
      pv += tvPv;
      const eq = pv + 1470 - 4370;
      const ps = eq*1000/2604.6;
      document.getElementById("slMarginVal").textContent = (m*100).toFixed(1)+"%";
      document.getElementById("slGrowthVal").textContent = (g*100).toFixed(1)+"%";
      const priceEl = document.getElementById("dcfPrice");

      priceEl.textContent = "¥"+psR.toLocaleString();
      const res = document.getElementById("dcfResult");
      res.classList.remove("beat-act","beat-ito","below-current");
      if(ps>=3400) res.classList.add("beat-ito");
      else if(ps>=2693) res.classList.add("beat-act");
      else if(ps<2556) res.classList.add("below-current");
      const zh = ST.lang==="zh";
      let sub;
      if(ps>=3400) sub = zh?"🟣 DCF 超過 J. Ito ¥3,400──需要 6%+ margin 且 2%+ growth":"🟣 Exceeds J. Ito ¥3,400 — needs 6%+ margin AND 2%+ growth";
      else if(ps>=2693) sub = zh?"🔵 DCF 超過 ACT ¥2,693──需要美國改造 + 海外擴張成功":"🔵 Exceeds ACT ¥2,693 — requires US transformation + overseas expansion";
      else if(ps>=2556) sub = zh?"⚪ 落在 ACT 與當前市價之間":"⚪ Between current and ACT";
      else sub = zh?"🔴 低於當前市價──standalone 計畫無法支撐當前估值":"🔴 Below current — standalone plan can't support current price";
      document.getElementById("dcfSub").textContent = sub;
      // for vs line (axis ¥0~¥5000)
      const pct = Math.max(0,Math.min(100,ps/5000*100));
      const tick = document.getElementById("dcfLiveTick");
      tick.style.left = pct+"%";
      document.getElementById("dcfLiveLbl").textContent = "¥"+psR.toLocaleString();
      calcSet('mgn',parseInt(slMargin.value,10));
      calcSet('grw',parseInt(slGrowth.value,10));
    };
    slMargin.addEventListener("input",update);
    slGrowth.addEventListener("input",update);
    update();
  }

  // SoTP calculator (T2) — 4 sliders
  const slDom = document.getElementById("slDom");
  if(slDom){
    const slOvs = document.getElementById("slOvs"),
          slSup = document.getElementById("slSup"),
          slFin = document.getElementById("slFin");
    const ebDom=355, ebOvs=655, ebSup=55, ebFin=37, cash=1470, debt=4370, shares=2604.6;
    const update=()=>{
      const dm = parseInt(slDom.value,10)/10,
            om = parseInt(slOvs.value,10)/10,
            sm = parseInt(slSup.value,10)/10,
            fm = parseInt(slFin.value,10)/10;
      const vDom = ebDom*dm, vOvs = ebOvs*om, vSup = ebSup*sm, vFin = ebFin*fm;
      const totalEV = vDom+vOvs+vSup+vFin;
      const eq = totalEV + cash - debt;
      const ps = eq*1000/shares;
      document.getElementById("slDomVal").textContent = dm.toFixed(1)+"×";
      document.getElementById("slOvsVal").textContent = om.toFixed(1)+"×";
      document.getElementById("slSupVal").textContent = sm.toFixed(1)+"×";
      document.getElementById("slFinVal").textContent = fm.toFixed(1)+"×";
      const max = Math.max(vDom,vOvs,vSup,vFin,1);
      const setBar=(id,lblId,valId,v)=>{
        const w = v/max*100;
        document.getElementById(id).style.width = w+"%";
        document.getElementById(lblId).textContent = "¥"+Math.round(v).toLocaleString()+"B";
        document.getElementById(valId).textContent = "¥"+Math.round(v).toLocaleString()+"B";
      };
      setBar("barDom","barDomLbl","valDom",vDom);
      setBar("barOvs","barOvsLbl","valOvs",vOvs);
      setBar("barSup","barSupLbl","valSup",vSup);
      setBar("barFin","barFinLbl","valFin",vFin);
      const tot = document.getElementById("sotpTotal");
      tot.classList.remove("beat-act","beat-ito");
      if(ps>=3400) tot.classList.add("beat-ito");
      else if(ps>=2693) tot.classList.add("beat-act");
      document.getElementById("sotpTotalVal").textContent = "¥"+Math.round(ps).toLocaleString();
      const zh = ST.lang==="zh";
      let sub;
      if(ps>=3400) sub = zh?"🟣 SoTP 已超過 J. Ito offer──需要對 conglomerate 拆分後的 upside 極樂觀":"🟣 Exceeds J. Ito — needs very bullish post-breakup upside";
      else if(ps>=2693) sub = zh?"🔵 SoTP 已超過 ACT offer──暗示 conglomerate discount 真實存在":"🔵 Exceeds ACT — implies conglomerate discount is real";
      else if(ps>=2399) sub = zh?"⚪ 接近 analyst 基準──保守 c-store 倍數":"⚪ Near analyst base — conservative c-store multiples";
      else sub = zh?"🔴 SoTP 低於 standalone 估值──你的倍數太悲觀":"🔴 SoTP below standalone — your multiples are too bearish";
      document.getElementById("sotpSub").textContent = sub;
      // vs line
      const pct = Math.max(0,Math.min(100,ps/5000*100));
      document.getElementById("sotpLiveTick").style.left = pct+"%";
      document.getElementById("sotpLiveLbl").textContent = "¥"+Math.round(ps).toLocaleString();
      calcSet('dom',parseInt(slDom.value,10));
      calcSet('ovs',parseInt(slOvs.value,10));
      calcSet('sup',parseInt(slSup.value,10));
      calcSet('fin',parseInt(slFin.value,10));
    };
    [slDom,slOvs,slSup,slFin].forEach(s=>s.addEventListener("input",update));
    update();
  }
}

function render(){
  content.innerHTML = (VIEWS[ST.view]||viewS0)();
  document.querySelectorAll(".navItem").forEach(b=>{
    b.classList.toggle("active", b.dataset.view===ST.view);
  });
  window.scrollTo({top:0,behavior:"instant"});
  // wire interactivity after each render
  wireCalculators();
}
function setView(v){ST.view=v;save();render();}

document.querySelectorAll(".navItem").forEach(b=>{
  b.addEventListener("click",()=>setView(b.dataset.view));
});
document.getElementById("btnLang").addEventListener("click",()=>{
  ST.lang = ST.lang==="zh"?"en":"zh"; save(); render();
  showToast(ST.lang==="zh"?"已切換為中文":"Switched to English");
});
document.getElementById("btnPresenter").addEventListener("click",()=>{
  ST.presenter = !ST.presenter; save();
  document.body.classList.toggle("presenter", ST.presenter);
  showToast(ST.presenter?(ST.lang==="zh"?"投影模式：開":"Presenter: ON"):(ST.lang==="zh"?"投影模式：關":"Presenter: OFF"));
});
document.getElementById("btnReset").addEventListener("click",()=>{
  if(!confirm(ST.lang==="zh"?"重置所有投票、答題與展開狀態？":"Reset all polls, quizzes & reveals?"))return;
  ST = {...DEF, lang:ST.lang}; save(); render();
  showToast(ST.lang==="zh"?"已重置":"Reset complete");
});
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
  if(e.key==="ArrowRight"){const i=VIEW_ORDER.indexOf(ST.view);if(i<VIEW_ORDER.length-1)setView(VIEW_ORDER[i+1]);}
  if(e.key==="ArrowLeft"){const i=VIEW_ORDER.indexOf(ST.view);if(i>0)setView(VIEW_ORDER[i-1]);}
  if(e.key==="l"||e.key==="L"){document.getElementById("btnLang").click();}
  if(e.key==="p"||e.key==="P"){document.getElementById("btnPresenter").click();}
  if(e.key==="r"||e.key==="R"){document.getElementById("btnReset").click();}
});
content.addEventListener("click",e=>{
  const pollBtn = e.target.closest("[data-poll]");
  if(pollBtn){vote(pollBtn.dataset.poll, pollBtn.dataset.opt); render(); return;}
  const quizBtn = e.target.closest("[data-quiz]");
  if(quizBtn){
    const k=quizBtn.dataset.quiz; const i=parseInt(quizBtn.dataset.idx,10);
    if(!ST.quizDone[k]){ST.quizDone[k]=i+1; save(); render();}
  }
});
if(ST.presenter)document.body.classList.add("presenter");
render();
</script>
</body>
</html>
